<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Rappel : votre parcours arrive à échéance</title>
</head>
<body style="margin:0;padding:0;background:#F8FAFC;font-family:Inter,Arial,sans-serif;color:#1E293B;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="padding:32px 16px;">
        <tr><td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="560" style="background:#FFFFFF;border-radius:14px;overflow:hidden;border:1px solid #E2E8F0;">
                <tr><td style="padding:24px 28px;background:linear-gradient(135deg,#F59E0B,#FBBF24);color:#FFFFFF;">
                    <strong style="font-size:18px;">Sentys — Rappel deadline</strong>
                </td></tr>
                <tr><td style="padding:32px 28px;">
                    <h1 style="margin:0 0 12px;font-size:22px;font-weight:700;">{{ParcoursName}}</h1>
                    <p style="margin:0 0 18px;font-size:14px;line-height:1.6;color:#334155;">
                        Votre parcours obligatoire arrive à échéance le <strong>{{Deadline}}</strong>.
                        Pensez à le terminer avant cette date pour rester en conformité.
                    </p>
                    <a href="{{DashboardUrl}}" style="display:inline-block;background:#F59E0B;color:#FFFFFF;text-decoration:none;padding:12px 22px;border-radius:8px;font-weight:600;font-size:14px;">Continuer mon parcours</a>
                </td></tr>
                <tr><td style="padding:18px 28px;background:#F8FAFC;border-top:1px solid #E2E8F0;font-size:11px;color:#94A3B8;text-align:center;">
                    © 2026 Sentys — Bêta privée
                </td></tr>
            </table>
        </td></tr>
    </table>
</body>
</html>
